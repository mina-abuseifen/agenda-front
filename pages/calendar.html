<div id="calendarSection" class="p-0">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h3 class="mb-1 text-primary"><i class="fas fa-calendar-alt me-2"></i> تقويم الجلسات</h3>
            <p class="text-muted mb-0">استعراض الجلسات ومتابعة الحضور والتأجيل والأرشفة من التقويم مباشرة</p>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button type="button" class="btn btn-primary" id="btnAddCalendarSession">
                <i class="fas fa-plus"></i> Ø¥Ø¶Ø§ÙØ© Ø¬Ù„Ø³Ø©
            </button>
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-primary active" id="btnCalMonth">شهر</button>
                <button type="button" class="btn btn-outline-primary" id="btnCalWeek">أسبوع</button>
                <button type="button" class="btn btn-outline-primary" id="btnCalDay">يوم</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8 mb-4">
            <div class="card shadow border-0 h-100">
                <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-sm btn-outline-secondary" id="btnCalPrev"><i class="fas fa-chevron-right"></i></button>
                        <h5 class="mb-0 fw-bold text-dark mx-2" id="calendarTitle"></h5>
                        <button class="btn btn-sm btn-outline-secondary" id="btnCalNext"><i class="fas fa-chevron-left"></i></button>
                    </div>
                    <button class="btn btn-sm btn-primary" id="btnCalToday">اليوم</button>
                </div>
                <div class="card-body p-3">
                    <div class="row text-center fw-bold text-muted mb-2 g-1" id="calendarWeekdays">
                        <div class="col">السبت</div>
                        <div class="col">الأحد</div>
                        <div class="col">الاثنين</div>
                        <div class="col">الثلاثاء</div>
                        <div class="col">الأربعاء</div>
                        <div class="col">الخميس</div>
                        <div class="col">الجمعة</div>
                    </div>
                    <div class="row g-1" id="calendarGrid" style="min-height: 400px;"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-4 mb-4">
            <div class="card shadow border-0 h-100 bg-white">
                <div class="card-header bg-light border-0 py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-secondary" id="selectedDateTitle">جلسات اليوم</h5>
                    <span class="badge bg-primary rounded-pill" id="selectedDayCounter">0 جلسة</span>
                </div>
                <div class="card-body p-3 d-flex flex-column justify-content-between" style="min-height: 400px;">
                    <div id="selectedDaySessionsList" class="flex-grow-1 overflow-auto" style="max-height: 420px;"></div>

                    <div class="border-top pt-3 mt-3">
                        <h6 class="small fw-bold text-muted mb-2">دليل الحالات:</h6>
                        <div class="d-flex flex-wrap gap-2 small">
                            <span class="d-flex align-items-center gap-1"><span class="badge bg-warning p-1 rounded-circle" style="width:8px;height:8px;display:inline-block;"></span> بانتظار الحضور</span>
                            <span class="d-flex align-items-center gap-1"><span class="badge bg-success p-1 rounded-circle" style="width:8px;height:8px;display:inline-block;"></span> تم الحضور</span>
                            <span class="d-flex align-items-center gap-1"><span class="badge bg-danger p-1 rounded-circle" style="width:8px;height:8px;display:inline-block;"></span> تم التأجيل</span>
                            <span class="d-flex align-items-center gap-1"><span class="badge bg-secondary p-1 rounded-circle" style="width:8px;height:8px;display:inline-block;"></span> مؤرشفة</span>
                            <span class="d-flex align-items-center gap-1"><span class="badge bg-info p-1 rounded-circle" style="width:8px;height:8px;display:inline-block;"></span> مكتبية</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
